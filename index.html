<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Warning</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Google Font for clean look */
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0b0102; /* একদম ডিপ ব্ল্যাকিশ মেরুন ব্যাকগ্রাউন্ড */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Noto Serif Bengali', serif;
            overflow: hidden;
            perspective: 1000px;
        }

        /* প্রফেশনাল ও কমপ্যাক্ট ওয়ার্নিং বক্স */
        .warning-box {
            background: rgba(12, 2, 4, 0.98);
            border: 1px solid rgba(255, 255, 255, 0.12); /* প্রফেশনাল স্লিক বর্ডার */
            padding: 35px 25px;
            border-radius: 4px; /* শার্প প্রফেশনাল এজ */
            text-align: center;
            max-width: 420px; /* বক্সের সাইজ ছোট করা হয়েছে */
            width: 88%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 0 0 1px rgba(255, 255, 255, 0.2) inset;
            position: relative;
            
            /* বক্সের ধীরগতির প্রফেশনাল ভাইব্রেশন */
            animation: boxSlowShake 2s infinite alternate ease-in-out;
        }

        /* কঙ্কাল লোগো */
        .icon-container {
            font-size: 3rem;
            color: #b3001e; /* একটু ক্লাসি ডার্ক রেড */
            margin-bottom: 12px;
            text-shadow: 0 0 10px rgba(179, 0, 30, 0.4);
        }

        /* হ্যাকিং গ্লিচ হেডলাইন */
        .warning-title {
            font-size: 1.8rem;
            color: #ffffff;
            font-family: monospace;
            text-transform: uppercase;
            letter-spacing: 6px;
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
            opacity: 0.9;
        }

        /* গ্লিচ ইফেক্ট এলিমেন্ট */
        .warning-title::before,
        .warning-title::after {
            content: 'WARNING';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0c0204;
            font-family: monospace;
        }

        .warning-title::before {
            left: 2px;
            text-shadow: -2px 0 #00ff66;
            clip: rect(10px, 420px, 30px, 0);
            animation: hack-glitch 3.5s infinite linear alternate-reverse;
        }

        .warning-title::after {
            left: -2px;
            text-shadow: -2px 0 #ff002b;
            clip: rect(40px, 420px, 60px, 0);
            animation: hack-glitch 2.5s infinite linear alternate-reverse;
        }

        /* মূল মেসেজ স্টাইল */
        .message {
            color: #b0a4a5; /* একটু ম্লান গ্রে কালার প্রফেশনাল লুকের জন্য */
            font-size: 1.05rem;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .line {
            opacity: 0;
            transform: translateY(8px);
            animation: fadeInLine 0.8s forwards ease-out;
            display: block;
            margin-bottom: 10px;
        }

        /* একটার পর একটা লাইন আসার টাইমিং */
        .line-1 { animation-delay: 0.8s; }
        .line-2 { animation-delay: 2.2s; }
        .line-3 { animation-delay: 3.8s; }

        /* 'R' এর ডার্ক এবং প্রফেশনাল মিনিমাল কালার স্টাইল */
        .signature {
            font-size: 1.8rem;
            color: #5c0000; /* পারফেক্ট ডার্ক ব্লাড-রেড */
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            letter-spacing: 2px;
            display: block;
            margin-top: 20px;
            opacity: 0;
            animation: fadeInLine 0.8s forwards ease-out;
            animation-delay: 5.2s;
        }

        /* --- অ্যানিমেশন সমূহ --- */

        /* বক্সের খুব সূক্ষ্ম প্রফেশনাল মুভমেন্ট */
        @keyframes boxSlowShake {
            0% { transform: translate(0.3px, 0.3px); }
            50% { transform: translate(-0.3px, 0.3px); }
            100% { transform: translate(0.3px, -0.3px); }
        }

        /* সাইবার গ্লিচ */
        @keyframes hack-glitch {
            0% { clip: rect(20px, 9999px, 35px, 0); transform: skew(0.1deg); }
            10% { clip: rect(5px, 9999px, 15px, 0); transform: skew(-0.3deg); }
            20% { clip: rect(45px, 9999px, 55px, 0); transform: skew(0.5deg); }
            30% { clip: rect(0px, 9999px, 0px, 0); transform: skew(0deg); }
            100% { clip: rect(0px, 9999px, 0px, 0); transform: skew(0deg); }
        }

        /* স্মুথ লাইন ফেড-ইন */
        @keyframes fadeInLine {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="warning-box">
        <div class="icon-container">
            <i class="fa-solid fa-skull-crossbones"></i>
        </div>
        
        <h1 class="warning-title">WARNING</h1>
        
        <p class="message">
            <span class="line line-1">"ভুলটা তুমি জেনেশুনেই করেছ।</span>
            <span class="line line-2">এখন শুধু নীরবতা উপভোগ করো, কারণ ঝড়ের আগের সময়টা এমনই শান্ত থাকে।</span>
            <span class="line line-3">সময়ের জন্য অপেক্ষা করো, নিজের ভুলের মাশুল দেওয়ার জন্য প্রস্তুতি নাও।"</span>
        </p>
        
        <span class="signature">R</span>
    </div>

</body>
</html>
